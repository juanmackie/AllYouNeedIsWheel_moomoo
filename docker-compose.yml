version: "3.8"

services:
  opend:
    build:
      context: ./docker/opend
    container_name: moomoo-opend
    ports:
      - "${OPEND_PORT:-11111}:11111"
    environment:
      - MOOMOO_LOGIN=${MOOMOO_LOGIN}
      - MOOMOO_PASSWORD=${MOOMOO_PASSWORD}
      - MOOMOO_LANG=${MOOMOO_LANG:-en}
      - MOOMOO_LOG_LEVEL=${MOOMOO_LOG_LEVEL:-info}
    volumes:
      - wheel_data:/app/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "11111"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - wheel-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: all-you-need-is-wheel
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - CONNECTION_CONFIG=connection_docker.json
      - MOOMOO_TRADING_PASSWORD=${MOOMOO_TRADING_PASSWORD:-}
      - PORT=8000
    volumes:
      - wheel_data:/app/data
    depends_on:
      opend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - wheel-network

networks:
  wheel-network:
    driver: bridge

volumes:
  wheel_data:
